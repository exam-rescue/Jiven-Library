<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiven Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .badge {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            color: #fbbf24;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar .fill {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 999px;
            animation: loading 2s ease-in-out infinite;
            background-size: 200% 100%;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-text {
            font-size: 13px;
            color: #64748b;
        }

        .footer {
            position: fixed;
            bottom: 24px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#x1F4DA;</div>
        <div class="badge">Coming Soon</div>
        <h1>Jiven Library</h1>
        <p class="subtitle">Something exciting is being built here.<br>Stay tuned &mdash; we'll be back soon!</p>
        <div class="progress-bar"><div class="fill"></div></div>
        <p class="progress-text">Construction under progress</p>
    </div>
    <div class="footer">&copy; 2026 Jiven Library</div>
</body>
</html>
